version: '3.9'

services:
  frontend:
    image: ghcr.io/ramsdale00/lubeoilsim/frontend:latest
    ports:
      - "7845:7845"
    environment:
      - BACKEND_HOST=backend:7846
    depends_on:
      - backend
    networks:
      - simnet

  backend:
    image: ghcr.io/ramsdale00/lubeoilsim/backend:latest
    ports:
      - "7846:7846"
    environment:
      - LUBOIL_DATABASE_URL=postgresql+asyncpg://sim:simpass@postgres:5432/luboilsim
      - LUBOIL_REDIS_URL=redis://redis:6379/0
      - LUBOIL_CELERY_BROKER_URL=redis://redis:6379/1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - OLLAMA_URL=http://4.247.160.91:62569
      - OLLAMA_MODEL=llama3.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - simnet
    command: uvicorn app.main:app --host 0.0.0.0 --port 7846 --reload

  celery_worker:
    image: ghcr.io/ramsdale00/lubeoilsim/backend:latest
    environment:
      - LUBOIL_DATABASE_URL=postgresql+asyncpg://sim:simpass@postgres:5432/luboilsim
      - LUBOIL_REDIS_URL=redis://redis:6379/0
      - LUBOIL_CELERY_BROKER_URL=redis://redis:6379/1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - simnet
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: luboilsim
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: simpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "7847:5432"
    networks:
      - simnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d luboilsim"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "7848:6379"
    networks:
      - simnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:

networks:
  simnet:
    driver: bridge
